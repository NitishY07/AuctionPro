<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Gateway | Auction Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg-dark);
            font-family: 'Roboto', sans-serif;
            color: var(--text-light);
            margin: 0;
            overflow: hidden;
        }

        .gateway-container {
            background: rgba(20, 20, 25, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 243, 255, 0.1);
            border: 1px solid rgba(0, 243, 255, 0.2);
            width: 100%;
            max-width: 450px;
            text-align: center;
            position: relative;
        }

        .gateway-container::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--accent-neon), transparent, var(--accent-neon));
            z-index: -1;
            border-radius: 16px;
            opacity: 0.3;
        }

        .logo {
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .logo span {
            color: var(--accent-neon);
        }

        .subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--accent-neon);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
            outline: none;
        }

        .btn-join {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            background: var(--accent-neon);
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
        }

        .btn-join:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.6);
            background: #fff;
        }

        .notice {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="gateway-container">
        <div class="logo">AUCTION<span>PRO</span></div>
        <div class="subtitle">Cloud-Synced Multi-Tournament System</div>

        <div class="form-group">
            <label for="admin-name">Full Name</label>
            <input type="text" id="admin-name" placeholder="e.g. John Doe" required autocomplete="off">
        </div>

        <div class="form-group">
            <label for="admin-email">Email Address</label>
            <input type="email" id="admin-email" placeholder="e.g. john@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
            <label for="admin-org">Organization / Team</label>
            <input type="text" id="admin-org" placeholder="e.g. IPL Operations" required autocomplete="organization">
        </div>

        <div class="form-group">
            <label for="tournament-id">Tournament ID (Create or Join)</label>
            <input type="text" id="tournament-id" placeholder="e.g. IPL2024" required autocomplete="off">
        </div>

        <button class="btn-join" id="btn-enter">Sign Up & Enter Auction Center</button>

        <div class="notice">
            A unique Tournament ID keeps your data separate and secure. Anyone with the same ID will sync in real-time.
        </div>
    </div>

    <!-- Add Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>

    <script>
        document.getElementById('btn-enter').addEventListener('click', () => {
            const tId = document.getElementById('tournament-id').value.trim().toUpperCase();
            const aName = document.getElementById('admin-name').value.trim();
            const aEmail = document.getElementById('admin-email').value.trim();
            const aOrg = document.getElementById('admin-org').value.trim();

            if (!tId || !aName || !aEmail) {
                alert("Please fill in your Name, Email, and a Tournament ID.");
                return;
            }

            // Save to local storage for the admin dashboard to pick up
            localStorage.setItem('active_tournament', tId);
            localStorage.setItem('admin_name', aName);
            localStorage.setItem('admin_email', aEmail);
            localStorage.setItem('admin_org', aOrg);

            // Attempt to save user data to Firebase if it's configured
            if (window.firebaseDb && firebaseConfig.apiKey !== "YOUR_API_KEY") {
                const safeEmail = aEmail.replace(/[.#$[\]]/g, '_'); // Firebase keys can't contain . # $ [ ]
                const userRef = window.firebaseDb.ref('users/' + safeEmail);
                
                // Save globally under users
                userRef.set({
                    name: aName,
                    email: aEmail,
                    organization: aOrg,
                    lastTournament: tId,
                    lastLogin: new Date().toISOString()
                });

                // Also save under the specific tournament
                const adminRef = window.firebaseDb.ref('tournaments/' + tId + '/adminDetails');
                adminRef.set({
                    name: aName,
                    email: aEmail,
                    organization: aOrg
                }).then(() => {
                    window.location.href = `admin.html?t=${tId}`;
                }).catch(err => {
                    console.error("Firebase save failed", err);
                    window.location.href = `admin.html?t=${tId}`;
                });
            } else {
                // If Firebase not configured, just redirect
                window.location.href = `admin.html?t=${tId}`;
            }
        });

        // Allow pressing Enter key
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                document.getElementById('btn-enter').click();
            }
        });
    </script>
</body>
</html>
