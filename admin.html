<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Sport Auction Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <header class="app-header">
        <div class="logo-area" style="display: flex; align-items: center; gap: 15px;">
            <div class="logo">AUCTION<span>PRO</span></div>
            <div id="display-tournament-id" style="color: var(--accent-neon); font-size: 14px; font-weight: bold; letter-spacing: 1px; padding: 4px 10px; border: 1px solid rgba(0, 243, 255, 0.4); border-radius: 4px; background: rgba(0, 243, 255, 0.05);"></div>
        </div>
        <div class="header-controls">
            <button id="btn-export" class="btn btn-outline">Export Data</button>
            <label for="import-file" class="btn btn-outline">Import Data</label>
            <input type="file" id="import-file" accept=".json,.csv,.xlsx" style="display: none;">
            <button id="btn-reset-app" class="btn btn-danger">Reset App</button>
        </div>
    </header>

    <main class="dashboard-grid">
        <!-- Sidebar Configuration -->
        <aside class="sidebar">
            <div class="panel">
                <h2>General Settings</h2>
                <div class="form-group">
                    <label>Sport Name</label>
                    <input type="text" id="setting-sport" placeholder="e.g., Cricket, Football">
                </div>
                <div class="form-group">
                    <label>Player Roles (Comma separated)</label>
                    <input type="text" id="setting-roles" placeholder="Striker, Defender, Midfielder">
                </div>
                <div class="form-group">
                    <label>Overlay Mode (Auction)</label>
                    <select id="setting-overlay-mode">
                        <option value="fullscreen">Full Screen</option>
                        <option value="lower-third">Lower Third</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Active Overlay Screen</label>
                    <select id="setting-active-screen" style="border-color: var(--accent-neon); color: var(--accent-neon);">
                        <option value="auction">Live Auction Center</option>
                        <option value="teams">Teams & Purses (Roster)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Currency / Unit Symbol</label>
                    <input type="text" id="setting-currency" placeholder="e.g. ₹, $, Pts">
                </div>
                <div class="form-group">
                    <label>Timer Display</label>
                    <select id="setting-show-timer">
                        <option value="yes">Show Timer</option>
                        <option value="no">Hide Timer</option>
                    </select>
                </div>
                <button id="btn-save-settings" class="btn btn-primary w-100">Save Settings</button>
            </div>

            <div class="panel mt">
                <h2>Teams Setup</h2>
                <form id="form-add-team" class="compact-form">
                    <input type="text" id="team-name" placeholder="Team Name" required>
                    <input type="number" id="team-budget" placeholder="Budget (e.g. 100000)" required>
                    <button type="submit" class="btn btn-secondary">Add Team</button>
                </form>
                <div class="list-container" id="list-teams">
                    <!-- Teams populate here -->
                </div>
            </div>
            
            <div class="panel mt">
                <h2>Add Player</h2>
                <form id="form-add-player" class="compact-form">
                    <input type="text" id="player-name" placeholder="Player Name" required>
                    <select id="player-role" required>
                        <!-- Dynamic Roles -->
                    </select>
                    <input type="number" id="player-base-price" placeholder="Base Price" required>
                    <input type="text" id="player-stats" placeholder="Stats (e.g. M: 100 • R: 50)">
                    <input type="text" id="player-image" placeholder="Image URL (Optional)">
                    <button type="submit" class="btn btn-secondary">Add Player</button>
                </form>
            </div>
            
            <div class="panel auto-height mt">
                <h2>Auction History</h2>
                <div class="history-log" id="history-log">
                    <!-- Logs populate here -->
                </div>
            </div>
        </aside>

        <!-- Main Auction Area -->
        <section class="main-content">
            <div class="auction-console">
                <div class="console-header">
                    <h2>Live Auction Center</h2>
                    <div class="timer-controls">
                        <input type="number" id="timer-input" value="30" class="timer-input">
                        <button id="btn-timer-start" class="btn btn-success">Start Timer</button>
                        <button id="btn-timer-pause" class="btn btn-warning">Pause</button>
                        <button id="btn-timer-reset" class="btn btn-outline">Reset</button>
                        <div id="countdown-display" class="countdown">30s</div>
                    </div>
                </div>

                <div class="current-auction-display" id="current-player-card">
                    <!-- Default State -->
                    <div class="empty-state">No Player Selected for Auction</div>
                </div>

                <div class="bidding-controls">
                    <div class="bid-increments">
                        <button class="btn btn-bid" data-inc="200">+ 200</button>
                        <button class="btn btn-bid" data-inc="500">+ 500</button>
                        <button class="btn btn-bid" data-inc="1000">+ 1k</button>
                        <button class="btn btn-bid" data-inc="5000">+ 5k</button>
                        <button class="btn btn-bid" data-inc="10000">+ 10k</button>
                        <button class="btn btn-bid" data-inc="50000">+ 50k</button>
                        <div class="custom-bid">
                            <input type="number" id="custom-bid-val" placeholder="Custom Bid">
                            <button id="btn-custom-bid" class="btn btn-outline">Set</button>
                        </div>
                    </div>
                    
                    <div class="bid-assignment">
                        <label>Assign Bid To Team:</label>
                        <input type="hidden" id="select-bid-team">
                        <div id="team-bid-buttons" class="team-bid-buttons-grid">
                            <!-- Team buttons populate here -->
                        </div>
                    </div>

                    <div class="auction-actions">
                        <button id="btn-sell" class="btn btn-sell">SELL PLAYER</button>
                        <button id="btn-unsold" class="btn btn-unsold">MARK UNSOLD</button>
                        <button id="btn-undo" class="btn btn-warning" style="display: none; padding: 15px 30px; font-size: 18px;">UNDO LAST</button>
                    </div>
                </div>
            </div>

            <!-- Players Pool -->
            <div class="panel mt players-pool">
                <div class="panel-header">
                    <h2>Players Pool ('<span id="pool-count">0</span>' Total)</h2>
                    <div class="filters">
                        <select id="filter-status">
                            <option value="all">All</option>
                            <option value="pending">Pending</option>
                            <option value="sold">Sold</option>
                            <option value="unsold">Unsold</option>
                        </select>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Role</th>
                                <th>Base Price</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="table-players">
                            <!-- Players populate here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

        <!-- Added SheetJS for parsing .xls/.xlsx files natively in the browser -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js?v=2"></script>
    <script src="js/store.js?v=2"></script>
    <script src="js/admin.js?v=2"></script>
    <script src="js/auction.js?v=2"></script>
</body>
</html>
